<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Mars Engineering Team</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 30%, #7a2c1a 0%, #4a160c 45%, #1a0805 100%);
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .banner h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.15;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }
    .banner p {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 2vw, 1.5rem);
      opacity: 0.85;
    }
    .team {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .team-member {
      font-size: 1.1rem;
    }
    .team-member .name {
      font-weight: 600;
      color: #fff;
    }
    .team-member .title {
      font-size: 0.95rem;
      opacity: 0.75;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <main class="banner">
    <h1>Welcome to the Mars Engineering Team Home Page</h1>
    <p>Engineering the next frontier 🚀</p>
    <div class="team">
      <div class="team-member">
        <div class="name">Bellona Atalanta</div>
        <div class="title">VP Engineering</div>
      </div>
      <div class="team-member">
        <div class="name">Rhea Silvia</div>
        <div class="title">Principal Engineer</div>
      </div>
      <div class="team-member">
        <div class="name">Sam Chen</div>
        <div class="title">Junior Engineer</div>
      </div>
    </div>
  </main>
</body>
</html>
